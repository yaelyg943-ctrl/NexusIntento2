<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexusPreds - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, arrayUnion, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBbjWjnkDKvbM3bsZEL8y32rxtyn6-lnco",
            authDomain: "bd-nexus-c2f53.firebaseapp.com",
            projectId: "bd-nexus-c2f53",
            storageBucket: "bd-nexus-c2f53.firebasestorage.app",
            messagingSenderId: "822335338391",
            appId: "1:822335338391:web:88dc9bb75d359a621276d2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "nexus-preds-v1";
        
        let localUserId = "user_" + Math.random().toString(36).substring(7);

        // Intentar conectar pero no bloquear si falla
        signInAnonymously(auth).catch(() => console.log("Modo sin auth activado"));

        // Referencia a la colección (Ruta fija para que funcione siempre)
        const getColRef = () => collection(db, 'artifacts', appId, 'public', 'data', 'ventas');

        // FUNCIÓN: CARGAR DATOS
        function loadData() {
            onSnapshot(getColRef(), (snap) => {
                const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render(list);
            }, (err) => console.error("Error Firestore:", err));
        }

        // FUNCIÓN: GUARDAR
        window.saveVenta = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerText = "Guardando...";

            try {
                const data = {
                    cliente: document.getElementById('cliente').value,
                    plataforma: document.getElementById('plataforma').value,
                    telefono: document.getElementById('telefono').value,
                    email: document.getElementById('email').value,
                    pass: document.getElementById('pass').value,
                    vence: document.getElementById('vence').value,
                    creado: serverTimestamp(),
                    userId: auth.currentUser?.uid || localUserId
                };
                await addDoc(getColRef(), data);
                e.target.reset();
                window.toggleModal('modal-add');
            } catch (err) {
                alert("Error al guardar: Asegúrate de habilitar Firestore en tu panel de Firebase.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Guardar en Base de Datos";
            }
        };

        // FUNCIÓN: ELIMINAR
        window.deleteVenta = async (id) => {
            if (!confirm("¿Eliminar este registro?")) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'ventas', id));
            } catch (err) { alert("No se pudo eliminar"); }
        };

        // FUNCIÓN: WHATSAPP
        window.sendWA = (id, tel, cliente, plataforma, email, pass, vence) => {
            const msg = `*NEXUSPREDS*\nHola ${cliente}, tu cuenta de ${plataforma} está lista.\nUser: ${email}\nPass: ${pass}\nVence: ${vence}`;
            window.open(`https://wa.me/${tel.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`, '_blank');
        };

        function render(data) {
            const container = document.getElementById('app-list');
            container.innerHTML = data.map(item => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border mb-3">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-slate-800">${item.cliente}</h3>
                            <p class="text-xs text-indigo-600 font-bold uppercase">${item.plataforma}</p>
                        </div>
                        <span class="text-[10px] bg-slate-100 px-2 py-1 rounded-lg font-mono">${item.vence}</span>
                    </div>
                    <div class="mt-3 grid grid-cols-2 gap-2">
                        <button onclick="window.sendWA('${item.id}', '${item.telefono}', '${item.cliente}', '${item.plataforma}', '${item.email}', '${item.pass}', '${item.vence}')" class="bg-green-500 text-white py-2 rounded-xl text-xs font-bold">WhatsApp</button>
                        <button onclick="window.deleteVenta('${item.id}')" class="bg-red-50 text-red-500 py-2 rounded-xl text-xs font-bold">Eliminar</button>
                    </div>
                    <div class="mt-2 p-2 bg-slate-50 rounded-lg text-[10px] font-mono text-slate-500 truncate">
                        ${item.email} | ${item.pass}
                    </div>
                </div>
            `).join('');
        }

        window.toggleModal = (id) => {
            const m = document.getElementById(id);
            m.classList.toggle('hidden');
            m.classList.toggle('flex');
        };

        window.onload = loadData;
    </script>

    <style>
        body { font-family: sans-serif; background: #f8fafc; }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-slate-900 tracking-tighter">NexusPreds</h1>
            <button onclick="window.toggleModal('modal-add')" class="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold text-sm shadow-lg shadow-indigo-100">+ Nuevo</button>
        </header>

        <div id="app-list">
            <p class="text-center text-slate-400 text-sm mt-10 italic">Cargando base de datos...</p>
        </div>
    </div>

    <!-- MODAL -->
    <div id="modal-add" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-xl">
            <h2 class="text-xl font-bold mb-4">Nueva Venta</h2>
            <form onsubmit="window.saveVenta(event)" class="space-y-3">
                <input type="text" id="cliente" placeholder="Cliente" required class="w-full p-3 bg-slate-100 rounded-xl outline-none text-sm">
                <input type="tel" id="telefono" placeholder="WhatsApp (Ej: 521...)" required class="w-full p-3 bg-slate-100 rounded-xl outline-none text-sm">
                <select id="plataforma" required class="w-full p-3 bg-slate-100 rounded-xl outline-none text-sm font-bold">
                    <option value="Netflix">Netflix</option>
                    <option value="Disney+">Disney+</option>
                    <option value="Max">Max</option>
                    <option value="Prime Video">Prime Video</option>
                </select>
                <input type="text" id="email" placeholder="Correo / Usuario" required class="w-full p-3 bg-slate-100 rounded-xl outline-none text-sm">
                <input type="text" id="pass" placeholder="Contraseña" required class="w-full p-3 bg-slate-100 rounded-xl outline-none text-sm">
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-400 ml-2">VENCIMIENTO</label>
                    <input type="date" id="vence" required class="w-full p-3 bg-slate-100 rounded-xl outline-none text-sm">
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="window.toggleModal('modal-add')" class="flex-1 py-3 text-slate-500 font-bold">Cancelar</button>
                    <button type="submit" class="flex-[2] bg-indigo-600 text-white py-3 rounded-2xl font-bold shadow-lg">Guardar</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
